name: 🚀 Build APK Sederhana

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Izinkan gradlew
        run: chmod +x gradlew

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
  # ═══════════════════════════════════════════════════════════
  # JOB 1 — Persiapan: toggle Ads & Billing, simpan source
  # ═══════════════════════════════════════════════════════════
  prepare:
    name: ⚙️ Toggle Fitur & Persiapan
    runs-on: ubuntu-latest

    outputs:
      version_code: ${{ steps.ver.outputs.version_code }}
      version_name: ${{ steps.ver.outputs.version_name }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      # ── 2. Pastikan gradlew executable ───────────────────
      - name: 🔑 Chmod gradlew
        run: chmod +x gradlew

      # ── 3. Version code dari timestamp ───────────────────
      - name: 🔢 Set version
        id: ver
        run: |
          CODE=$(date +%Y%m%d%H%M)
          NAME="${{ github.event.inputs.version_name }}"
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "version_name=$NAME"  >> $GITHUB_OUTPUT
          echo "✅ Version $NAME ($CODE)"

      # ── 4. Toggle ADS ────────────────────────────────────
      - name: 🎯 Toggle Google Ads
        run: |
          ENABLE="${{ github.event.inputs.enable_ads }}"
          echo "Ads = $ENABLE"
          if [ "$ENABLE" = "false" ]; then
            python3 - << 'PYEOF'
          import os, re

          def comment_block(content, tag):
              """Comment semua baris di antara // TAG_START dan // TAG_END"""
              pattern = re.compile(
                  rf'(//{tag}_START.*?//{tag}_END)',
                  re.DOTALL
              )
              def replacer(m):
                  lines = m.group(1).splitlines()
                  out = []
                  for line in lines:
                      stripped = line.strip()
                      if stripped in (f'//{tag}_START', f'//{tag}_END') or stripped.startswith('//'):
                          out.append(line)
                      else:
                          out.append('//' + line if line.startswith(' ') or line.startswith('\t')
                                     else '// ' + line)
                  return '\n'.join(out)
              return pattern.sub(replacer, content)

          exts = ('.kt', '.java', '.kts', '.toml')
          skip = {'build', '.git', '.gradle', '.idea'}

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in skip]
              for fname in files:
                  if not any(fname.endswith(e) for e in exts):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      txt = open(path, encoding='utf-8').read()
                      if '//\u2500\u2500 ADS_START' in txt or '// ADS_START' in txt:
                          # Normalise both marker styles
                          txt2 = txt.replace('\u2500\u2500 ADS_START', 'ADS_START') \
                                    .replace('\u2500\u2500 ADS_END',   'ADS_END')
                          new  = comment_block(txt2, 'ADS')
                          if new != txt2:
                              open(path, 'w', encoding='utf-8').write(new)
                              print(f'  commented ADS: {path}')
                  except Exception as e:
                      print(f'  skip {path}: {e}')
          PYEOF
            echo "⛔ ADS dinonaktifkan"
          else
            echo "✅ ADS tetap aktif"
          fi

      # ── 5. Toggle BILLING ─────────────────────────────────
      - name: 💳 Toggle In-App Billing
        run: |
          ENABLE="${{ github.event.inputs.enable_billing }}"
          echo "Billing = $ENABLE"
          if [ "$ENABLE" = "false" ]; then
            python3 - << 'PYEOF'
          import os, re

          def comment_block(content, tag):
              pattern = re.compile(
                  rf'(//{tag}_START.*?//{tag}_END)',
                  re.DOTALL
              )
              def replacer(m):
                  lines = m.group(1).splitlines()
                  out = []
                  for line in lines:
                      stripped = line.strip()
                      if stripped in (f'//{tag}_START', f'//{tag}_END') or stripped.startswith('//'):
                          out.append(line)
                      else:
                          out.append('//' + line if line.startswith(' ') or line.startswith('\t')
                                     else '// ' + line)
                  return '\n'.join(out)
              return pattern.sub(replacer, content)

          exts = ('.kt', '.java', '.kts', '.toml')
          skip = {'build', '.git', '.gradle', '.idea'}

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in skip]
              for fname in files:
                  if not any(fname.endswith(e) for e in exts):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      txt = open(path, encoding='utf-8').read()
                      if 'BILLING_START' in txt:
                          txt2 = txt.replace('\u2500\u2500 BILLING_START', 'BILLING_START') \
                                    .replace('\u2500\u2500 BILLING_END',   'BILLING_END')
                          new  = comment_block(txt2, 'BILLING')
                          if new != txt2:
                              open(path, 'w', encoding='utf-8').write(new)
                              print(f'  commented BILLING: {path}')
                  except Exception as e:
                      print(f'  skip {path}: {e}')
          PYEOF
            echo "⛔ BILLING dinonaktifkan"
          else
            echo "✅ BILLING tetap aktif"
          fi

      # ── 6. Simpan source yang sudah dimodifikasi ──────────
      - name: 💾 Upload source hasil toggle
        uses: actions/upload-artifact@v4
        with:
          name: source-toggled
          # Upload semua file kecuali folder build & .git
          path: |
            .
            !.git/**
            !.gradle/**
            !**/build/**
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Build Debug APK
  # ═══════════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: 📥 Download source
        uses: actions/download-artifact@v4
        with:
          name: source-toggled
          path: .

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # Pastikan gradlew bisa dieksekusi setelah di-download ulang
      - name: 🔑 Chmod gradlew
        run: chmod +x gradlew

      # Download gradle-wrapper.jar jika tidak ada di repo
      - name: 🔧 Bootstrap Gradle Wrapper JAR
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ] || [ ! -s "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "✅ gradle-wrapper.jar: $(du -sh $JAR)"
          else
            echo "✅ gradle-wrapper.jar sudah ada"
          fi

      - name: 🔧 Pasang google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: 🔨 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }}

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: "DEBUG-APK-v${{ needs.prepare.outputs.version_name }}"
          path: app/build/outputs/apk/debug/**.apk
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — Build Release APK + AAB (signed)
  # ═══════════════════════════════════════════════════════════
  build-release:
    name: 📦 Build Release APK & AAB
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: 📥 Download source
        uses: actions/download-artifact@v4
        with:
          name: source-toggled
          path: .

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: 🔑 Chmod gradlew
        run: chmod +x gradlew

      # Download gradle-wrapper.jar jika tidak ada di repo
      - name: 🔧 Bootstrap Gradle Wrapper JAR
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ] || [ ! -s "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "✅ gradle-wrapper.jar: $(du -sh $JAR)"
          else
            echo "✅ gradle-wrapper.jar sudah ada"
          fi

      - name: 🔧 Pasang google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # Decode keystore dari secret Base64
      - name: 🔐 Decode Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/release.jks
          echo "✅ Keystore decoded: $(du -sh app/release.jks)"

      # Verifikasi keystore valid
      - name: 🔍 Verifikasi Keystore
        run: |
          keytool -list \
            -keystore app/release.jks \
            -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -noprompt \
          && echo "✅ Keystore valid" \
          || (echo "❌ Keystore error" && exit 1)

      # Build Release APK
      - name: 📱 Build Release APK
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }}

      # Build Release AAB
      - name: 📦 Build Release AAB
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }}

      # Rename & pindahkan output dengan info fitur
      - name: 🏷️ Rename output
        run: |
          VER="${{ needs.prepare.outputs.version_name }}"
          ADS="${{ github.event.inputs.enable_ads }}"
          BILL="${{ github.event.inputs.enable_billing }}"
          LABEL="v${VER}_ads-${ADS}_billing-${BILL}"
          mkdir -p release-out

          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)

          [ -n "$APK" ] && cp "$APK" "release-out/VibesPositif-${LABEL}.apk" && echo "APK ✅"
          [ -n "$AAB" ] && cp "$AAB" "release-out/VibesPositif-${LABEL}.aab" && echo "AAB ✅"

          echo "--- Output files ---"
          ls -lh release-out/

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: "RELEASE-APK-v${{ needs.prepare.outputs.version_name }}-ads${{ github.event.inputs.enable_ads }}-billing${{ github.event.inputs.enable_billing }}"
          path: release-out/*.apk
          retention-days: 30

      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: "RELEASE-AAB-v${{ needs.prepare.outputs.version_name }}-ads${{ github.event.inputs.enable_ads }}-billing${{ github.event.inputs.enable_billing }}"
          path: release-out/*.aab
          retention-days: 30

      # Hapus keystore dari runner setelah selesai
      - name: 🗑️ Bersihkan keystore
        if: always()
        run: rm -f app/release.jks

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — Ringkasan hasil build
  # ═══════════════════════════════════════════════════════════
  summary:
    name: 📋 Ringkasan Build
    runs-on: ubuntu-latest
    needs: [prepare, build-debug, build-release]
    if: always()

    steps:
      - name: 📋 Tulis ringkasan
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          # ✨ Build Selesai — Vibes Positif+
          SUMMARY

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY

          ## 📦 Info Build
          | | |
          |---|---|
          | **Versi** | ${{ needs.prepare.outputs.version_name }} (code: ${{ needs.prepare.outputs.version_code }}) |
          | **Google Ads** | ${{ github.event.inputs.enable_ads == 'true' && '✅ Aktif' || '⛔ Nonaktif' }} |
          | **In-App Billing** | ${{ github.event.inputs.enable_billing == 'true' && '✅ Aktif' || '⛔ Nonaktif' }} |
          | **Dijalankan oleh** | ${{ github.actor }} |
          | **Waktu** | $(date '+%d %B %Y %H:%M UTC') |

          ## ✅ Status Job
          | Job | Hasil |
          |---|---|
          | Persiapan & Toggle | ${{ needs.prepare.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |
          | Build Debug APK | ${{ needs.build-debug.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |
          | Build Release APK + AAB | ${{ needs.build-release.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |

          ## 📥 Cara Download Hasil Build
          1. Klik tab **Actions** di GitHub
          2. Klik nama workflow ini
          3. Scroll ke bawah → bagian **Artifacts**
          4. Klik nama artifact untuk download

          | Artifact | Isi | Untuk apa |
          |---|---|---|
          | RELEASE-APK-* | .apk signed | Install langsung ke HP |
          | RELEASE-AAB-* | .aab signed | Upload ke Play Store |
          | DEBUG-APK-* | .apk debug | Testing internal |
          SUMMARY
